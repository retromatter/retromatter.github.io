<!DOCTYPE html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <script defer src="https://use.fontawesome.com/releases/v5.14.0/js/all.js"></script> 

    <style>
      /* This ensures the body takes up the full height and pushes the footer down */
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding-top: 3.25rem; /* Space for fixed navbar */
      }

      /* This tells the main content area to grow and fill all available space */
      main.section {
        flex: 1;
      }
    </style>
  </head>
  
  <body class="has-navbar-fixed-top">
    
    <nav class="navbar is-fixed-top is-dark" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item" href="/">
        <strong>→ジュンリー</strong>
      </a>

      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMain">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>

    <div id="navbarMain" class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item" href="/">Home</a>
        <a class="navbar-item" href="/services/">Services</a>
        <a class="navbar-item" href="https://blog.junl.ee/">Blog</a>
      </div>
    </div>
  </div>
</nav>


    <main class="section">
      <div class="container">
        <div class="content">
  <h1 class="title">SETUP</h1>

  <p class="is-size-5 has-text-grey">12/03/2025 - junl.ee</p>

  <p>a work in progress.</p>
</div>

    <footer class="footer">
  <div class="container has-text-centered">

      <strong class="has-text-grey-darker">→ジュンリー</strong>
    </p>
    <p>
      <a href="http://localhost:4000" class="has-text-grey-dark">retromatter by junl.ee</a>

    <p class="is-size-7 has-text-grey">

</footer>

  
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Get all "navbar-burger" elements
        const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);

        // Check if there are any navbar burgers
        if ($navbarBurgers.length > 0) {
          // Add a click event on each of them
          $navbarBurgers.forEach(el => {
            el.addEventListener('click', () => {
              // Get the target from the "data-target" attribute
              const target = el.dataset.target;
              const $target = document.getElementById(target);

              // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
              el.classList.toggle('is-active');
              $target.classList.toggle('is-active');
            });
          });
        }
      });
    </script>
  </body>
</html>
